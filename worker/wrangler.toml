name = "akronstats-engine"
main = "src/index.ts"
compatibility_date = "2024-03-08"

# 1. Kill the default public route
workers_dev = false

# 2. Bind strictly to your Zero Trust zone (e.g., an /api path)
[[routes]]
pattern = "stats.yourdomain.com/api/*"
zone_name = "yourdomain.com"

[vars]
CORS_ORIGIN = "*"
